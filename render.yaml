services:
  # ── Django Backend (Web Service) ──────────────────────────
  - type: web
    name: quiz-backend
    runtime: python
    rootDir: backend-modified
    buildCommand: ./build.sh
    startCommand: bash -c "source $HOME/.profile && gunicorn quiz_backend.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: quiz_backend.settings
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app # Update this with your actual frontend URL

# ── PostgreSQL Database ─────────────────────────────────────
databases:
  - name: quiz-db
    plan: free

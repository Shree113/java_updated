services:
  # ── Django Backend (Web Service) ──────────────────────────
  - type: web
    name: quiz-backend
    runtime: python
    rootDir: backend-modified
    buildCommand: ./build.sh
    startCommand: gunicorn quiz_backend.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-db
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: quiz_backend.settings
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: static_site
          name: quiz-frontend
          property: url

  # ── React Frontend (Static Site) ──────────────────────────
  - type: static_site
    name: quiz-frontend
    rootDir: frontend-modified
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: quiz-backend
          property: url

# ── PostgreSQL Database ─────────────────────────────────────
databases:
  - name: quiz-db
    plan: free
